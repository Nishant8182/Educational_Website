<!DOCTYPE html>
<html>
<head>
	<link rel="shortcut icon" type="png" href="assets/img/icon/favicon.png">
	<title>Login SignUp</title>
	<link rel="stylesheet" type="text/css" href="assets/css/loginStyle.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

  <!-- It will redirect to the Home Page after submitting the form -->
  <script>
  $(document).ready(function(){
    $("form").submit(function(){
      alert("Great Job !");
    });
  });
  </script>
</head>
<body>
		<div class="form-box">
			<div class="button-box">
				<div id="btn"></div>
				<button type="button" class="toggle-btn" id="log" onclick="login()">Log In</button>
				<button type="button" class="toggle-btn" id="reg" onclick="register()">Register</button>
			</div>
			<div class="social-icons">
				<img src="assets/img/icon/fb2.png">
				<img src="assets/img/icon/insta2.png">
				<img src="assets/img/icon/tt2.png">
			</div>
			
			<!-- Login Form -->
			<form id="login" class="input-group" action="index.html">
				<div class="inp">
					<img src="assets/img/icon/user.png"><input type="text" id="email" class="input-field" placeholder="Email or Username" required>
				</div>
				<div class="inp">
					<img src="assets/img/icon/password.png"><input type="password" id="password" class="input-field" placeholder="Password" required>
				</div>
				<input type="checkbox" class="check-box">Remember Password
				<button type="submit" class="submit-btn">Log In</button>
			</form>


			<div class="other" id="other">
				<div class="instead ">
					<h3 style="margin-top: 40px; margin-bottom: 20px;">or</h3>
				</div>
				<button class="connect " onclick="google()">
					<img src="assets/img/icon/google.png"><span>Sign in with Google</span>
				</button>
			</div>
			
			<!-- Registration Form -->
			 
			<form id="register" class="input-group" action="index.html">
				<input type="text" class="input-field" placeholder="Full Name" required="required">
				<input type="email" class="input-field" placeholder="Email Address" required="required">
				<input type="password" class="input-field" placeholder="Create Password" name="psame" required="required">
				<input type="password" class="input-field" placeholder="Confirm Password" name="psame" required="required">
				<input type="checkbox" class="check-box" id="chkAgree" onclick="goFurther()"><span class="terms">I agree to the Terms & Conditions</span>
				<button type="submit" id="btnSubmit" class="submit-btn reg-btn" disabled>Register</button>
			</form>
		</div>
		<script type="text/javascript" src="assets/js/script.js"></script>
</body>
</html>
